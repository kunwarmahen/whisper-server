# GPU override (Podman + NVIDIA Container Toolkit via CDI)
#
# Requires a CDI spec on the host (generated once with the toolkit):
#   sudo nvidia-ctk cdi generate --output=/etc/cdi/nvidia.yaml
#   nvidia-ctk cdi list            # should list nvidia.com/gpu=all
#
# Usage (must be podman-compose, NOT `podman compose`):
#   podman-compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
#
# `podman compose` delegates to docker-compose, which hands "nvidia.com/gpu=all"
# to podman's Docker-compat socket as a literal path and silently drops the GPU.
# podman-compose maps devices: to `podman run --device`, which resolves CDI.
#
# CDI injects the host driver libraries (libcuda, libnvidia-ml, ...) and the
# device nodes into the container — raw /dev/nvidia* passthrough does not.

services:
  whisper:
    image: fedirz/faster-whisper-server:latest-cuda
    devices:
      - nvidia.com/gpu=all
    environment:
      - WHISPER__DEVICE=cuda
